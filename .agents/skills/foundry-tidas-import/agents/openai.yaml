interface:
  display_name: "Foundry TIDAS Import"
  short_description: "Orchestrate Foundry external data imports through context, curation, AI patches, gates, dry-run, commit, and readback"
  default_prompt: "Use $foundry-tidas-import when Data Foundry must import an external LCA package or source document into TIDAS: gather SDK contract context, convert or author candidate rows, run validation/QA/curation, route identity/classification/location decisions and other AI semantic repair to $foundry-tidas-authoring, then use dataset-post-authoring-finalize for CLI-owned dry-run, optional remote verify, mutation manifest, explicit commit handoff, post-write closeout, and task-level import completion reporting without direct database writes."
