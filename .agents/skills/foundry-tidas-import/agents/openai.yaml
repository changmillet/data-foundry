interface:
  display_name: "Foundry TIDAS Import"
  short_description: "Orchestrate Foundry imports through context, runtime evidence skills, curation, AI patches, gates, and readback"
  default_prompt: "Use $foundry-tidas-import when Data Foundry must import an external LCA package or source document into TIDAS: gather SDK contract context, convert or author candidate rows, resolve latest external source-evidence skills such as tiangong-kb-sci-search with npx skills when SCI paper evidence is needed, record the resolved upstream ref and command in the task workspace, run validation/QA/curation, route identity/classification/location decisions and other AI semantic repair to $foundry-tidas-authoring, then use dataset-post-authoring-finalize for CLI-owned dry-run, optional remote verify, mutation manifest, task-policy-gated commit handoff, post-write closeout, and task-level import completion reporting without direct database writes."
